spring.application.name=jomnorncode

server.port=8061

# DataSource Configuration
spring.datasource.url=jdbc:postgresql://localhost:5431/jomnorncode_db
spring.datasource.username=postgres
spring.datasource.password=qwerqwer
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Server Configuration

server.servlet.context-path=/api

# JWT Configuration
jwt.secret.key=a3f8c2e1d4b7960f5e2a1c8d3b6f9e0a2c5d8f1b4e7a0c3d6f9b2e5a8c1d4f7
jwt.expiration=5184000000

# Logging
logging.level.root=INFO
logging.level.edu.istad.jomnorncode=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

# OpenAPI/Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan= edu.istad.jomnorncode

# File Upload Configuration
file.upload.dir=uploads
file.upload.max-size=52428800
file.upload.allowed-types=jpg,jpeg,png,gif,pdf,doc,docx,xls,xlsx,ppt,pptx,zip,rar,mp4,mov,avi,flv,wmv,webm
file.upload.profile-pictures=jpg,jpeg,png
file.upload.course-materials=pdf,doc,docx,ppt,pptx,xls,xlsx,zip,rar,mp4,mov,avi,flv,wmv,webm
file.upload.certificates=pdf,jpg,jpeg,png
